<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笑いの夜スコア</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #150d12;
      --card: rgba(255, 245, 229, 0.12);
      --border: rgba(255, 245, 229, 0.28);
      --accent: #e94f37;
      --accent-2: #f5c542;
      --text: #f8f3ea;
      --muted: #d9cfc6;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Noto Sans JP', 'Space Grotesk', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(233, 79, 55, 0.12), transparent 30%),
        radial-gradient(circle at 78% 12%, rgba(245, 197, 66, 0.18), transparent 26%),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.06) 7px, transparent 7px, transparent 16px),
        linear-gradient(140deg, #1b0f17, #150d12 50%, #120a0d);
      min-height: 100vh;
      padding: 28px 16px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: min(1180px, 100%);
      display: grid;
      gap: 20px;
    }

    .header {
      display: grid;
      gap: 6px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: -0.5px;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .hello-fr {
      margin: 0;
      color: var(--accent-2);
      font-weight: 700;
      letter-spacing: 0.4px;
      font-size: 16px;
    }

    .icon-row {
      display: inline-flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      margin: 4px auto 0;
    }

    .icon-row img {
      width: 32px;
      height: 32px;
      display: block;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.35));
    }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      background-image: linear-gradient(145deg, rgba(233, 79, 55, 0.08), rgba(245, 197, 66, 0.06));
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .panel p.lead {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .score-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .score-display {
      background: rgba(233, 79, 55, 0.08);
      border: 1px solid rgba(233, 79, 55, 0.35);
      border-radius: 14px;
      padding: 14px 16px;
      display: grid;
      gap: 4px;
    }

    .score-display small {
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    .score-number {
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 700;
      color: var(--accent);
    }

    .verdict {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent-2);
      margin: 10px 0 0;
    }

    .range-wrap {
      display: grid;
      gap: 8px;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #e94f37, #f5c542);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #0f172a;
      border: 3px solid #7cf7d4;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #0f0a0c;
      border: 3px solid #f5c542;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      cursor: pointer;
    }

    .helper-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
    }

    button {
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      background: linear-gradient(120deg, #e94f37, #f5c542);
      color: #120a0d;
      font-weight: 700;
      letter-spacing: 0.3px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 12px 28px rgba(233, 79, 55, 0.36);
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .notice {
      margin: 12px 0 0;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(233, 79, 55, 0.12);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 4px;
    }

    .card .date {
      color: var(--muted);
      font-size: 13px;
    }

    .card .val {
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
    }

    .card .label {
      color: #fff;
      font-weight: 600;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 12px 0 6px;
      font-size: 14px;
    }

    .alert {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(245, 197, 66, 0.55);
      background: rgba(245, 197, 66, 0.12);
      color: #fbe0a1;
      font-size: 14px;
    }

    .audio-block {
      margin-top: 18px;
      display: grid;
      gap: 8px;
    }

    .player {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .player iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .panel { padding: 18px; }
      button { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <p class="hello">こんばんは、今日の笑いを測りましょう 👋</p>
      <p class="hello-fr">ティファインさん、こんにちは！</p>
      <h1>笑いの夜スコア</h1>
      <p>1日1回だけ、0〜10の笑い度を記録。後から振り返って夜の空気を思い出せます。</p>
      <div class="icon-row" aria-label="笑いの仲間アイコン">
        <img src="https://cdn-icons-png.flaticon.com/512/8710/8710157.png" alt="相撲力士のアイコン">
        <img src="https://cdn-icons-png.flaticon.com/512/7511/7511906.png" alt="ナゲットのアイコン">
      </div>
    </header>

    <div class="layout">
      <section class="panel" aria-labelledby="form-title">
        <div class="pill">夜の入力</div>
        <h2 id="form-title">今夜の笑いレベル</h2>
        <p class="lead">0〜10でスライドして笑いを数値化。直感でOKです。</p>

        <form id="score-form">
          <div class="score-row">
            <div class="range-wrap">
              <input type="range" id="score" name="score" min="0" max="10" step="1" value="5" aria-label="笑いのスコア">
              <div class="helper-row">
                <span>0（静かな夜）</span>
                <span>10（腹がよじれる大爆笑）</span>
              </div>
            </div>
            <div class="score-display">
              <small>選んだスコア</small>
              <div class="score-number" id="score-number">5</div>
            </div>
          </div>

          <p class="verdict" id="verdict">まずまず</p>
          <button type="submit" id="submit-btn">この夜を保存</button>
          <div class="notice">
            <span class="pill">ルール</span>
            <span>1日1件のみ。履歴はこの端末にローカル保存されます。</span>
          </div>
          <div class="alert" id="alert" hidden></div>
        </form>

        <div class="audio-block">
          <div class="pill">サウンド</div>
          <p class="lead">この夜に合う音を再生して、雰囲気をプラス。</p>
          <div class="player">
            <iframe title="夜のサウンド" src="https://www.youtube.com/embed/6VxRGj3BJco?si=1cWWWKf44apntuDa" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="panel" aria-labelledby="history-title">
        <div class="pill">履歴</div>
        <h2 id="history-title">最近の夜</h2>
        <div id="history" class="history-grid"></div>
        <div id="empty" class="empty" hidden>まだ履歴がありません。まずは最初の夜を記録しましょう！</div>
      </section>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'nuit_rires_historique';
    const scoreInput = document.getElementById('score');
    const scoreNumber = document.getElementById('score-number');
    const verdictEl = document.getElementById('verdict');
    const form = document.getElementById('score-form');
    const historyEl = document.getElementById('history');
    const emptyEl = document.getElementById('empty');
    const alertEl = document.getElementById('alert');
    const submitBtn = document.getElementById('submit-btn');

    const todayKey = () => new Date().toISOString().slice(0, 10);

    function calculerVerdict(score) {
      if (score === 10) return '最高（エクセレント）';
      if (score > 7) return 'とても良い（とても楽しい夜）';
      if (score > 4) return 'まずまず（そこそこ笑えた）';
      if (score > 0) return '弱め（もう少し笑いが欲しい）';
      return '最低（今日は笑えなかった）';
    }

    function chargerHistorique() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function sauvegarderHistorique(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function formatterDate(str) {
      const date = new Date(str + 'T00:00:00');
      return new Intl.DateTimeFormat('ja-JP', { weekday: 'long', month: 'short', day: 'numeric' }).format(date);
    }

    function majAffichage(score) {
      scoreNumber.textContent = score;
      verdictEl.textContent = calculerVerdict(score);
    }

    function majBouton(entries) {
      const existe = entries.some(e => e.date === todayKey());
      submitBtn.disabled = existe;
      submitBtn.textContent = existe ? '今日はすでに保存済み' : 'この夜を保存';
      alertEl.hidden = true;
      if (existe) {
        alertEl.textContent = '今日は記録済みです。次の入力は明日どうぞ。';
        alertEl.hidden = false;
      }
    }

    function rendreHistorique(entries) {
      historyEl.innerHTML = '';
      if (!entries.length) {
        emptyEl.hidden = false;
        return;
      }
      emptyEl.hidden = true;
      const sorted = [...entries].sort((a, b) => (a.date < b.date ? 1 : -1));
      sorted.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="date">${formatterDate(item.date)}</div>
          <div class="val">${item.score}/10</div>
          <div class="label">${item.verdict}</div>
        `;
        historyEl.appendChild(card);
      });
    }

    function init() {
      const entries = chargerHistorique();
      majAffichage(Number(scoreInput.value));
      rendreHistorique(entries);
      majBouton(entries);
    }

    scoreInput.addEventListener('input', (e) => {
      majAffichage(Number(e.target.value));
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const value = Number(scoreInput.value);
      if (Number.isNaN(value) || value < 0 || value > 10) {
        alertEl.textContent = '0〜10の数値を入力してください。';
        alertEl.hidden = false;
        return;
      }
      const entries = chargerHistorique();
      if (entries.some(entry => entry.date === todayKey())) {
        majBouton(entries);
        return;
      }
      const newEntry = { date: todayKey(), score: value, verdict: calculerVerdict(value) };
      const updated = [...entries, newEntry];
      sauvegarderHistorique(updated);
      rendreHistorique(updated);
      majBouton(updated);
    });

    init();
  </script>
</body>
</html>
